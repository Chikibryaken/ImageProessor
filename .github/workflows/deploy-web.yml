name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set base href for GitHub Pages
        run: |
          REPO="${{ github.event.repository.name }}"
          sed -i "s|<base href=\"/\" />|<base href=\"/$REPO/\" />|" \
            ImageProcessor.Web/wwwroot/index.html

      - name: Publish Blazor WASM
        run: |
          dotnet publish ImageProcessor.Web/ImageProcessor.Web.csproj \
            -c Release -o web-publish

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web-publish/wwwroot
          enable_jekyll: false
